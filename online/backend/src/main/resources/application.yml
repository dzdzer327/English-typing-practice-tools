server:
  port: 8080

spring:
  application:
    name: typing-practice

  # MySQL 数据库配置
  datasource:
    url: jdbc:mysql://localhost:3306/typing_practice?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&createDatabaseIfNotExist=true
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: root
    password: 123456

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect

# 自定义配置
app:
  checkin:
    streak-milestones: [7, 30, 100, 365]
